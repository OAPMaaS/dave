# ── DAVE local stack ──────────────────────────────────────────────────────────
# Requires: Ollama already running on the host (http://localhost:11434)
#           with llama3.2 and nomic-embed-text pulled.
#
# Start:    docker compose up --build
# Stop:     docker compose down
# Reset DB: docker compose down -v

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dave
      POSTGRES_USER: dave
      POSTGRES_PASSWORD: dave
    volumes:
      - ./chase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dave -d dave"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── DAVE app ────────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Reach host Ollama from inside the container (Docker Desktop magic DNS)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: dave
      DB_USER: dave
      DB_PASSWORD: dave
      LLM_PROVIDER: groq
    ports:
      - "7860:7860"
    volumes:
      - app-data:/app/data

volumes:
  pgdata:
  app-data:
